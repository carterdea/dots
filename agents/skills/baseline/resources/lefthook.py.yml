# Lefthook config for Python projects (uv).
# Fast staged-only checks on commit. Full-repo checks on push.

pre-commit:
  # piped: format then lint --fix sequentially against the same files
  # to avoid races where both writers compete on `stage_fixed: true`.
  piped: true
  commands:
    ruff-format:
      glob: "**/*.py"
      run: uv run ruff format {staged_files}
      stage_fixed: true
    ruff-check:
      glob: "**/*.py"
      run: uv run ruff check --fix {staged_files}
      stage_fixed: true

pre-push:
  parallel: false
  commands:
    ruff:
      run: uv run ruff check .
    typecheck:
      # Swap to `uv run pyright` if your repo uses pyright instead of basedpyright.
      run: uv run basedpyright
    test:
      run: uv run pytest
