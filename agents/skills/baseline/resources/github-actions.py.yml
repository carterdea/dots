# Single-package Python workflow.
# Mirrors pre-push hooks so local and CI enforce the same gate.
# Rename to .github/workflows/ci.yml at install time.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Swap setup/install/run commands for the repo's Python manager:
      #   Poetry -> actions/setup-python@v5 + `poetry install --with dev` + `poetry run <tool>`
      #   pip    -> actions/setup-python@v5 + `python -m pip install -r requirements.txt` + direct tool commands
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      # Swap to `uv run pyright` (and rename the step) if your repo uses pyright.
      - name: Typecheck (basedpyright)
        run: uv run basedpyright

      - name: Test (pytest)
        run: uv run pytest
