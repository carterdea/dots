# Single-package Python workflow.
# Mirrors pre-push hooks so local and CI enforce the same gate.
# Rename to .github/workflows/baseline.yml at install time.

name: baseline

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Typecheck (basedpyright)
        run: uv run basedpyright

      - name: Test (pytest)
        run: uv run pytest
