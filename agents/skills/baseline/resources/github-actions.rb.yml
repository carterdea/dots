# Single-package Ruby workflow.
# Rename to .github/workflows/ci.yml at install time.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Lint (rubocop)
        run: bundle exec rubocop

      # Default: `bundle exec rake test` (minitest convention).
      # Swap to `bundle exec rspec` if your repo uses RSpec.
      - name: Test
        run: bundle exec rake test
