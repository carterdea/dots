# Lefthook config for TypeScript / JavaScript projects.
# Fast staged-only checks on commit. Full-repo checks on push.

pre-commit:
  parallel: true
  commands:
    biome-check:
      glob: "**/*.{js,jsx,ts,tsx,json,jsonc}"
      run: bunx biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  parallel: false
  commands:
    biome:
      run: bunx biome check .
    typecheck:
      # Skipped automatically on JS-only repos (no tsconfig.json).
      run: if [ -f tsconfig.json ]; then bunx tsc --noEmit; fi
    fallow:
      # --fail-on-issues: warn-level findings exit 0 without it, so the gate
      # would silently pass. --quiet drops the stderr progress noise.
      run: bunx fallow --quiet --fail-on-issues
    test:
      run: bun run test
