# Monorepo workflow template — one job per workspace.
# Replace workspace names / paths to match the target repo.
# Rename to .github/workflows/ci.yml at install time.
#
# Principle: each workspace runs its OWN full quality suite.
# Add a job per detected workspace. Don't share steps across stacks.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # --- TypeScript workspace example (apps/web) ---
  ts-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Lint (biome)
        run: bunx biome check .
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Fallow
        run: bunx fallow
      - name: Test
        run: bun run test

  # --- Python workspace example (chat-services) ---
  py-chat:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chat-services
    steps:
      - uses: actions/checkout@v4
      # Swap setup/install/run commands for the workspace's Python manager:
      #   Poetry -> actions/setup-python@v5 + `poetry install --with dev` + `poetry run <tool>`
      #   pip    -> actions/setup-python@v5 + `python -m pip install -r requirements.txt` + direct tool commands
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --all-extras --dev
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      # Swap to `uv run pyright` if the workspace uses pyright.
      - name: Typecheck (basedpyright)
        run: uv run basedpyright
      - name: Test (pytest)
        run: uv run pytest

