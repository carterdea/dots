name: CI

on:
  pull_request:
  push:
    branches: [__DEFAULT_BRANCH__]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      SHOPIFY_PREVIEW_URL: ${{ vars.SHOPIFY_PREVIEW_URL }}
    steps:
      # Pinned from actions/checkout@v4 on 2026-05-23.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # Pinned from oven-sh/setup-bun@v2 on 2026-05-23.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Install
        run: bun install --frozen-lockfile

      # Pinned from actions/setup-node@v6.4.0 on 2026-06-15.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24

      - name: Theme Check
        # Pinned from shopify/theme-check-action@v2.2.0 on 2026-06-15.
        uses: shopify/theme-check-action@58fd69afdfc30110f997ba9e212b302671e00d3b
        with:
          theme_root: .
          version: 4.1.0

      - name: Biome
        run: bun run check:biome

      - name: Typecheck
        run: bun run check:type

      - name: Dead code (fallow)
        run: bun run check:dead-code

      - name: Unit tests
        run: bun run check:test

      - name: Install Playwright browsers
        if: ${{ env.SHOPIFY_PREVIEW_URL != '' }}
        run: bunx playwright install --with-deps chromium

      - name: Playwright accessibility
        if: ${{ env.SHOPIFY_PREVIEW_URL != '' }}
        run: bun run check:a11y

      - name: Playwright accessibility skipped
        if: ${{ env.SHOPIFY_PREVIEW_URL == '' }}
        run: |
          echo "skipped: set repository variable SHOPIFY_PREVIEW_URL to run Playwright accessibility checks in CI"
